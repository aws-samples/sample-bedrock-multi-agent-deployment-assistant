name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Lint
        working-directory: backend
        run: uv run ruff check src/ tests/

      - name: Test with coverage
        working-directory: backend
        run: uv run pytest tests/ -q --cov=src --cov-report=term-missing --cov-fail-under=40
        env:
          AI_DEPLOY_DEBUG: "true"
          AI_DEPLOY_COGNITO_USER_POOL_ID: ""
          AI_DEPLOY_COGNITO_CLIENT_ID: ""
          AWS_DEFAULT_REGION: us-west-2

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: frontend
        run: pnpm test -- --run

  infra-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        working-directory: infra
        run: npm ci

      - name: Type check
        working-directory: infra
        run: npx tsc --noEmit

      - name: Test
        working-directory: infra
        run: npx vitest run

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: pip-audit
        working-directory: backend
        run: uv run pip-audit
