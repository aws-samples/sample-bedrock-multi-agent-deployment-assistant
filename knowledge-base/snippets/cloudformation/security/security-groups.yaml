AWSTemplateFormatVersion: "2010-09-09"
Description: Security groups for ALB and inference instances

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id

Resources:
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - allows inbound HTTPS/HTTP from internet
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb-sg"

  InferenceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Inference instances - traffic from ALB only
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-inference-sg"

Outputs:
  ALBSecurityGroupId:
    Value: !Ref ALBSecurityGroup
  InferenceSecurityGroupId:
    Value: !Ref InferenceSecurityGroup
